<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #bccbb2;

<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col items-center justify-center p-4">
<!-- Top Branding Anchor (Suppressing Nav as per Transactional Rule) -->
<header class="fixed top-0 left-0 w-full p-8 flex justify-center z-50">
<div class="flex flex-col items-center gap-1">
<span class="text-4xl font-black text-primary tracking-tighter font-headline">ታማኝ</span>
<span class="text-[10px] uppercase tracking-[0.2em] font-bold text-secondary font-label">The Digital Guardian</span>
</div>
</header>
<!-- Main Auth Canvas -->
<main class="w-full max-w-[440px] mt-16 relative">
<!-- Visual Accent: Asymmetric Circle -->
<div class="absolute -top-12 -right-12 w-64 h-64 bg-primary-container/20 rounded-full blur-3xl -z-10"></div>
<div class="absolute -bottom-20 -left-12 w-72 h-72 bg-tertiary-container/10 rounded-full blur-3xl -z-10"></div>
<!-- Auth Card -->
<div class="bg-surface-container-lowest rounded-[2.5rem] p-8 shadow-2xl shadow-on-surface/5 overflow-hidden">
<!-- Header Section -->
<div class="mb-10">
<h1 class="font-headline font-extrabold text-3xl text-on-surface tracking-tight leading-tight">Welcome back</h1>
<p class="text-secondary mt-2 text-sm">Secure hyperlocal commerce starts here.</p>
</div>
<!-- Role Selection (Asymmetric Chips) -->
<div class="mb-8">
<label class="text-[11px] font-bold uppercase tracking-wider text-outline mb-3 block">Choose Your Role</label>
<div class="flex gap-2">
<button class="flex-1 py-3 px-4 rounded-xl bg-primary-container text-on-primary-container text-xs font-bold transition-all border-2 border-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">person</span>
                        Buyer
                    </button>
<button class="flex-1 py-3 px-4 rounded-xl bg-surface-container text-on-secondary-container text-xs font-bold hover:bg-surface-container-high transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">storefront</span>
                        Merchant
                    </button>
</div>
</div>
<!-- Form Fields -->
<form class="space-y-5">
<!-- Phone Number -->
<div class="space-y-1.5">
<label class="text-[11px] font-bold uppercase tracking-wider text-outline px-1 block">Phone Number</label>
<div class="relative flex items-center">
<div class="absolute left-4 flex items-center gap-2 text-secondary font-semibold border-r border-outline-variant/30 pr-3">
<img alt="Ethiopia Flag" class="w-5 h-3.5 rounded-sm object-cover" data-alt="close up of the Ethiopian flag with its green yellow and red stripes and blue pentagon emblem" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAhhGwcfjS9xAfhbxpMx1IQGtAposM0z54CbAb4QIQ7Tf3KOcZt2CLdFd3WnXQqP7VkYi2iYxy4WlNS45-uiYEA_ni95Eegf-IDqqv1lhr44kpMGWAR3HQq2s8WcdXgyudn_88lR3KsgLJ_j4cPJWb9vbotwnVPtPWkpBdh65BogMMZGVMxKSAiYh8D_Cvqfd8bIjXR7eYP8xxNYJwFTZ6JKZQFLCBIMUrDwPv2nDtni9bJyPAd622d2uk3u7p7LFsoXg06IGfOb5M"/>
<span class="text-sm">+251</span>
</div>
<input class="w-full pl-24 pr-4 py-4 bg-surface-container-low rounded-2xl border-none focus:ring-2 focus:ring-primary/20 font-semibold text-on-surface placeholder:text-outline-variant/60 transition-all" placeholder="911 234 567" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-[11px] font-bold uppercase tracking-wider text-outline block">Password</label>
<a class="text-[11px] font-bold text-tertiary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline-variant">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low rounded-2xl border-none focus:ring-2 focus:ring-primary/20 font-semibold text-on-surface placeholder:text-outline-variant/60 transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-outline-variant" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- M-Pesa Integration Toggle -->
<div class="p-4 bg-surface-container-high/50 rounded-2xl flex items-center justify-between group cursor-pointer hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white font-bold text-xs italic">M</div>
<div>
<p class="text-[13px] font-bold text-on-surface">Link M-Pesa</p>
<p class="text-[11px] text-secondary">Faster, verified transactions</p>
</div>
</div>
<div class="w-10 h-6 bg-outline-variant/30 rounded-full relative transition-colors group-hover:bg-primary-container">
<div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
</div>
</div>
<!-- Main CTA -->
<button class="w-full py-5 bg-gradient-to-br from-primary to-primary-container text-on-primary font-extrabold rounded-2xl shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 mt-4" type="submit">
                    Sign In
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
<span class="text-[10px] font-bold text-outline-variant uppercase tracking-widest">Or continue with</span>
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 rounded-xl bg-surface border border-outline-variant/20 hover:bg-surface-container-low transition-colors">
<img alt="Google" class="w-4 h-4 grayscale opacity-70" data-alt="Google company logo icon in a clean minimalist style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCogK5p-JYroxZ0voomDAnxMJP2cdTlaQWGl9xKkle5Zwm2z44kAA6do4WNMmQvQmHfI1nzkdv1YX5IsgGC0MpVKvvDoDagnSNIwbjC91tELUv9wfzNo5Qx3eAo3rObv91_LI4Bsa-84QUmnLH4jiq8jfUSJfe2l3l-BukpmBdZqPJTiu8Fz57Ke7k2i0lZZU3YVJlOdQi_5SKI_vJuykgZT2R7ij2UQqF7cqEJIe1CouWniowbffIBPmNPXckQLcOkUs2jj9Rhxpw"/>
<span class="text-xs font-bold text-secondary">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 rounded-xl bg-surface border border-outline-variant/20 hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[18px] text-on-surface">ios</span>
<span class="text-xs font-bold text-secondary">Apple</span>
</button>
</div>
<!-- Footer Link -->
<p class="text-center mt-10 text-sm text-secondary">
                New to ታማኝ? 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4" href="#">Create Account</a>
</p>
</div>
<!-- Trust Indicator -->
<div class="mt-8 flex items-center justify-center gap-3 opacity-60">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[10px] font-bold text-outline uppercase tracking-[0.15em]">Bank-grade encryption active</span>
</div>
</main>
<!-- Visual Floating Backdrop Image -->
<div class="fixed top-1/2 -left-40 -translate-y-1/2 w-[500px] h-[700px] opacity-10 hidden lg:block -z-20">
<img alt="Pattern" class="w-full h-full object-contain" data-alt="abstract geometric pattern with soft flowing lines in green and white tones reflecting trust and connectivity" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsPcgiVHtIeZY7PwGRuU8Vcy0Rhwskw_Njzwc34d8OhiSCnn_ERwdrxpXnW4ufLiqUJNiuvhVtcz0oeEq-OsZOMYwEoEWPpJQpU1J2WALrXhKY375Pztf2iiOkd0Njra2D0Rcq2rfVNqN3pDh9IroE92ZdU6z0WzPUKU-UBhftOEqKAMq81ZeGUeVZQx8PsEk-o66N60P0P-Rj2kIEhV5xsX5uKthEzPOSvWG_tqkTnKKSIubJBkn46T9I5HW29h46SfU-Ar-3JgI"/>
